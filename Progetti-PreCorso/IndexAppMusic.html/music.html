<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Free</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎧 Echo Free-La tua musica ovunque!</h1>
    <p>Unisciti alla nostra community e crea la tua esperienza musicale personalizzata</p>
    <form onsubmit="alert('Benvenutə in Echo Free!')">
      <div>
        <input type="text" placeholder="Il tuo nome" />
      </div>
      <div>
        <input type="text" placeholder="Il tuo cognome" />
      </div>
      <div>
        <input type="email" placeholder="La tua email" />
      </div>
      <div>
        <input type="password" placeholder="Crea una password" />
      </div>
      <div>
        <input type="date" />
      </div>
      <div>
        <input type="number" placeholder="Numero di telefono" />
      </div>
      <div>
        <h4>Quali sono i tuoi gusti musicali?</h4>
        <label><input type="checkbox" /> Pop</label>
        <label><input type="checkbox" /> Blues</label>
        <label><input type="checkbox" /> Jazz</label>
        <label><input type="checkbox" /> R&B</label>
        <label><input type="checkbox" /> Indie Rock</label>
        <label><input type="checkbox" /> Hip Hop</label>
      </div>
      <div>
        <h4>Privacy</h4>
        <label>
          <input type="radio" />
          Accetto i termini e le condizioni di Echo Free
        </label>
      </div>
      <br>
      <button type="submit">
        Inizia il tuo viaggio musicale
      </button>
    </form>
    <p>Echo Free-Dove la musica incontra la tua personalità</p>
    </div>
  </body>
</html>
